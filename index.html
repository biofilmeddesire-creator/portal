<!DOCTYPE html>
<html>
<head>
    <title>BiofilmedDesire | Secure Portal</title>
    <style>
        body { background-color: #fcf6f2; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #2c3e50; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div> <script>
        // PASTE YOUR GOOGLE WEB APP URL (the one ending in /exec) BELOW
        const GOOGLE_SCRIPT_URL = "YOUR_GOOGLE_SCRIPT_EXEC_URL_HERE"; 
        
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        if (code) {
            // Forward the landlord to the private engine instantly
            window.location.href = GOOGLE_SCRIPT_URL + "?code=" + encodeURIComponent(code);
        } else {
            document.body.innerHTML = "<h3>Access Denied. Please use your official link.</h3>";
        }
    </script>
</body>
</html>
