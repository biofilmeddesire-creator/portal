<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BD Portal">
    <title>BiofilmedDesire Residence Portal</title>
    <link id="manifest-link" rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon-192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icon-192.png">
    <link rel="apple-touch-icon" sizes="120x120" href="icon-192.png">
    <link rel="shortcut icon" href="icon-192.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght=600&family=Inter:wght=400;500;600&display=swap" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; -webkit-touch-callout: none; box-sizing: border-box; }
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; padding: 40px 15px; color: #1e293b; -webkit-text-size-adjust: 100%; overscroll-behavior-y: none; }
        .container { max-width: 500px; width: 100%; background: #ffffff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin: auto; border-top: 5px solid #0f172a; position: relative; }
        .top-right-logo { position: absolute; top: 15px; right: 15px; width: 55px; height: 55px; object-fit: cover; border-radius: 50%; border: 1px solid #e2e8f0; background-color: white; }
        h2 { font-family: 'Playfair Display', serif; font-weight: 600; text-align: left; margin-bottom: 30px; color: #0f172a; font-size: 1.4rem; padding-right: 65px; }
        .secure-login-text { font-size: 0.85rem; font-weight: 500; color: #64748b; margin-top: -20px; margin-bottom: 25px; }
        @media (max-width: 576px) { 
            body { padding: 20px 10px; } 
            .container { padding: 25px 15px; border-radius: 8px; } 
            .top-right-logo { width: 45px; height: 45px; top: 10px; right: 10px; } 
            h2 { font-size: 1.25rem; padding-right: 50px; margin-bottom: 20px; } 
            .room-card { padding: 15px; } 
        }
        .form-label { font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; margin-bottom: 8px; display: block; }
        .room-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; margin-bottom: 15px; position: relative; }
        .btn-remove { position: absolute; top: 10px; right: 10px; background: #fee2e2; color: #ef4444; border: none; border-radius: 4px; padding: 2px 8px; font-weight: bold; font-size: 0.8rem; min-width: 28px; min-height: 28px; cursor: pointer; }
        .btn-remove:hover { background: #fca5a5; }
        .btn-add { background-color: #e2e8f0; color: #0f172a; font-weight: 600; border: none; border-radius: 6px; padding: 12px; width: 100%; margin-bottom: 25px; min-height: 44px; cursor: pointer; }
        .btn-add:hover { background-color: #cbd5e1; }
        .btn-submit { width: 100%; padding: 14px; font-weight: 600; background-color: #0f172a; color: white; border: none; border-radius: 6px; margin-top: 15px; min-height: 48px; font-size: 1rem; cursor: pointer; }
        .btn-submit:hover { background-color: #1e293b; }
        .btn-submit:active { background-color: #334155; transform: scale(0.98); }
        .whatsapp-success { color: #15803d; font-size: 0.9rem; margin-top: 15px; text-align: center; font-weight: 500; }
        .text-danger { color: #dc2626; font-size: 0.9rem; margin-top: 15px; text-align: center; }
        input, select, textarea { font-size: 16px !important; min-height: 44px; width: 100%; }
        input[type="number"] { -moz-appearance: textfield; }
        input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        #loadingScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        #loadingScreen img { width: 120px; height: 120px; border-radius: 24px; object-fit: cover; border: 2px solid rgba(255,255,255,0.1); }
        #loadingScreen p { color: #94a3b8; font-family: sans-serif; margin-top: 16px; font-size: 14px; letter-spacing: 0.5px; }
        #statusMsg { margin-top: 20px; text-align: center; font-weight: 600; padding: 12px; border-radius: 6px; }
        .password-wrapper { position: relative; display: flex; align-items: center; }
        .eye-icon { position: absolute; right: 15px; cursor: pointer; display: flex; align-items: center; color: #64748b; width: 22px; height: 22px; user-select: none; }
        .eye-icon:hover { color: #0f172a; }
        .eye-icon svg { width: 100%; height: 100%; }
        .price-spots-row { display: flex; gap: 12px; flex-wrap: nowrap; }
        .price-spots-row > div { flex: 1 1 0; min-width: 0; }
        @media (max-width: 360px) { .price-spots-row { flex-direction: column; gap: 0; } }
        .status-badge { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; border-radius: 8px; margin-bottom: 20px; font-size: 0.85rem; line-height: 1.4; animation: fadeIn 0.3s ease-out; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 3px; flex-shrink: 0; }
        .status-text { flex: 1; }
        .status-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 2px; }
    </style>
</head>
<body>
    <div id="loadingScreen">
        <img src="https://biofilmeddesire-creator.github.io/portal/rsz_logo.jpg" alt="Logo">
        <p>Loading Secure Gateway...</p>
    </div>

    <div class="container" id="loginGate" style="display:none;">
        <img src="https://biofilmeddesire-creator.github.io/portal/rsz_logo.jpg" class="top-right-logo" alt="Logo">
        <h2>BiofilmedDesire Residence Portal</h2>
        <div class="secure-login-text">Secure Login</div>
        
        <div id="loginError" class="text-danger text-start mb-3" style="display:none;"></div>
        
        <div class="mb-3 text-start">
            <label class="form-label">Location Token</label>
            <input type="text" id="loginToken" class="form-control" readonly style="background:#e2e8f0; cursor:not-allowed;">
        </div>
        
        <div class="mb-4 text-start">
            <label class="form-label">Access PIN</label>
            <div class="password-wrapper">
                <input type="password" id="loginPin" class="form-control" placeholder="****" maxlength="4" inputmode="numeric" style="text-align:center; font-size:1.5rem; letter-spacing:0.5em;">
                <span class="eye-icon" onclick="togglePinVisibility('loginPin', this)">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </span>
            </div>
        </div>
        
        <button type="button" class="btn-submit" id="loginBtn" style="margin-bottom: 15px;">Sign In</button>
        <div style="margin-top: 15px; margin-bottom: 20px;">
            <a href="#" id="forgotPinBtn" style="color: #2563eb; font-size: 0.9rem; font-weight: 600; text-decoration: none;">Forgot password?</a>
        </div>
        <p style="color: #64748b; font-size: 0.8rem; font-weight: 500; margin-bottom: 0;">🔒 Secure & Encrypted</p>
    </div>

    <div class="container" id="mainContent" style="display:none;">
        <img src="https://biofilmeddesire-creator.github.io/portal/rsz_logo.jpg" class="top-right-logo" alt="Logo">
        <h2 id="portalHeading">Residence Updates</h2>
        
        <div class="mb-3 text-start">
            <label class="form-label">Residence Name</label>
            <input type="text" id="residenceName" class="form-control" placeholder="Enter residence name">
        </div>

        <div id="roomContainer"></div>
        <button type="button" class="btn-add" id="addRoomBtn">+ Add Room Option</button>

        <div id="ownerSettings" style="display:none; border-top:2px solid #e2e8f0; margin-top:30px; padding-top:20px;">
            <h3 style="font-family:'Playfair Display', serif; font-size:1.2rem; margin-bottom:20px; text-align:left;">Caretaker Staff Matrix</h3>
            <div id="caretakerContainer"></div>
            <button type="button" class="btn-add" id="addCaretakerBtn" style="background-color:#ffffff; border:1px solid #cbd5e1; margin-bottom:15px;">+ Add Another Caretaker</button>
            <button type="button" class="btn-submit" id="saveStaffBtn" style="background-color:#15803d; margin-top:0;">Save Staff Settings</button>
            <div id="settingsMsg" style="text-align:center; font-size:0.85rem; font-weight:600; margin-top:10px; display:none;"></div>
        </div>

        <button type="button" class="btn-submit" id="submitAllBtn">Submit Live Updates</button>
        <div id="statusMsg" style="display:none;"></div>
    </div>

    <script>
        const API_URL = "https://api.biofilmeddesire.com/v1/sync"; // Connects to Cloudflare Worker proxy/Apps script web app URL
        let roomTypeOptions = ["Single", "Sharing (Per Bed)", "Bachelor", "1 Bedroom Apartment", "2 Bedroom Apartment"];
        let tokenCode = "";
        let staffCount = 0;

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            tokenCode = urlParams.get('id') || urlParams.get('code') || "";
            document.getElementById('loginToken').value = tokenCode;
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('loginGate').style.display = 'block';
        });

        function togglePinVisibility(inputId, el) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                el.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L17.772 17.772M15.23 15.23a1 1 0 01-1.42 0l-3.38-3.38a1 1 0 010-1.414l3.38-3.38a1 1 0 011.414 1.42L11.83 12l3.4 3.4z" />
                    </svg>`;
            } else {
                input.type = "password";
                el.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>`;
            }
        }

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const pinVal = document.getElementById('loginPin').value.trim();
            const errDiv = document.getElementById('loginError');
            if (!tokenCode || !pinVal) {
                errDiv.innerText = "Please enter your 4-digit security access PIN.";
                errDiv.style.display = "block";
                return;
            }
            errDiv.style.display = "none";
            
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'verifyPortalLogin', security_token: tokenCode, pin: pinVal })
                });
                const response = await res.json();
                if (response.success) {
                    document.getElementById('loginGate').style.display = 'none';
                    document.getElementById('mainContent').style.display = 'block';
                    document.getElementById('portalHeading').innerText = response.residenceName || "Residence Updates";
                    
                    if (response.role === 'MASTER') {
                        document.getElementById('ownerSettings').style.display = 'block';
                        renderStaffCards(response.staff || []);
                    } else {
                        document.getElementById('ownerSettings').style.display = 'none';
                    }
                } else {
                    errDiv.innerText = response.error || "Invalid dynamic PIN configuration framework.";
                    errDiv.style.display = "block";
                }
            } catch(e) {
                errDiv.innerText = "Security sync failure network exception pipeline.";
                errDiv.style.display = "block";
            }
        });

        document.getElementById('forgotPinBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            const emailInput = prompt("Enter your registered recovery email address:");
            if (!emailInput) return;
            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "forgotPasswordRequest", security_token: tokenCode, email: emailInput.trim() })
                });
                const response = await res.json();
                alert(response.message || "Request handled successfully.");
            } catch (err) {
                alert("Network error processing password reset link.");
            }
        });

        function createCaretakerCard(staff = {name:'', pin:'', phone:''}) {
            staffCount++;
            const div = document.createElement('div');
            div.className = 'room-card';
            div.style.background = '#f8fafc';
            div.innerHTML = `
                <button type="button" class="btn-remove" onclick="this.parentElement.remove()">X</button>
                <div class="mb-2">
                    <label class="form-label">Caretaker Name</label>
                    <input type="text" class="form-control staff-name" value="${staff.name || ''}" placeholder="Caretaker Full Name">
                </div>
                <div class="row g-2">
                    <div class="col-6">
                        <label class="form-label">Caretaker Mobile Phone</label>
                        <input type="text" class="form-control staff-phone" value="${staff.phone || ''}" placeholder="e.g. 0721234567">
                    </div>
                    <div class="col-6">
                        <label class="form-label">4-Digit Login PIN</label>
                        <input type="text" class="form-control staff-pin" maxlength="4" value="${staff.pin || ''}" placeholder="e.g. 1234">
                    </div>
                </div>`;
            return div;
        }

        function renderStaffCards(staffArray) {
            const container = document.getElementById('caretakerContainer');
            container.innerHTML = '';
            staffArray.forEach(s => container.appendChild(createCaretakerCard(s)));
        }

        document.getElementById('addCaretakerBtn').addEventListener('click', () => {
            document.getElementById('caretakerContainer').appendChild(createCaretakerCard());
        });

        document.getElementById('saveStaffBtn').addEventListener('click', async () => {
            const msg = document.getElementById('settingsMsg');
            const btn = document.getElementById('saveStaffBtn');
            btn.disabled = true; btn.innerText = "Saving Staff Matrix...";
            
            const staffCards = document.querySelectorAll('#caretakerContainer .room-card');
            const staffData = [];
            staffCards.forEach(card => {
                staffData.push({
                    name: card.querySelector('.staff-name').value.trim(),
                    phone: card.querySelector('.staff-phone').value.trim(),
                    pin: card.querySelector('.staff-pin').value.trim()
                });
            });

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'saveStaffSettings', security_token: tokenCode, staff: staffData })
                });
                const response = await res.json();
                msg.style.display = "block";
                if(response.status === "Success") {
                    msg.className = "whatsapp-success";
                    msg.innerText = "Staff settings columns synced successfully!";
                } else {
                    msg.className = "text-danger";
                    msg.innerText = response.error || "Failed saving matrix metrics.";
                }
            } catch(e) {
                msg.style.display = "block";
                msg.className = "text-danger";
                msg.innerText = "Connection pipeline handshake configuration error.";
            }
            btn.disabled = false; btn.innerText = "Save Staff Settings";
        });
    </script>
</body>
</html>
