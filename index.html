    <script>
        // 1. Get the code from the URL
        const urlParams = new URLSearchParams(window.location.search);
        let code = urlParams.get('code');

        // 2. Redirect logic
        if (code) {
            // Replace the URL below with your actual Google Script Exec URL from your screenshot

            window.location.replace(scriptUrl + "?code=" + encodeURIComponent(code));
        } else {
            // If someone tries to visit without a code, show the security screen
            document.body.innerHTML = `
                <div style="display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif; text-align:center; background:#f4f4f4;">
                    <div>
                        <h1 style="color:#333;">Access Denied</h1>

                    </div>
                </div>`;
        }
    </script>
