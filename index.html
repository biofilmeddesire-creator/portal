<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BD Portal">
  
  <title>BiofilmedDesire Residence Portal</title>
  
  <link rel="manifest" href="manifest.json">
  
  <link rel="icon" type="image/jpeg" sizes="192x192" href="rsz_logo.jpg">
  <link rel="icon" type="image/jpeg" sizes="512x512" href="rsz_logo.jpg">
  <link rel="apple-touch-icon" sizes="192x192" href="rsz_logo.jpg">
  <link rel="apple-touch-icon" sizes="180x180" href="rsz_logo.jpg">
  <link rel="apple-touch-icon" sizes="152x152" href="rsz_logo.jpg">
  <link rel="apple-touch-icon" sizes="120x120" href="rsz_logo.jpg">
  <link rel="shortcut icon" href="rsz_logo.jpg">
  
  <style>
    * {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background-color: #0f172a;
      -webkit-text-size-adjust: 100%;
    }
    #splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    #splash img {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.1);
    }
    #splash p {
      color: #94a3b8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin-top: 16px;
      font-size: 14px;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div id="splash">
    <img src="rsz_logo.jpg" alt="Biofilmed Desire">
    <p>Loading portal...</p>
  </div>

  <script>
    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      let locationCode = urlParams.get('id') || '';

      /* Recover token from localStorage if URL has no ?id= */
      if (!locationCode) {
        locationCode = localStorage.getItem('bd_portal_id') || '';
      }

      /* Save token whenever we have one */
      if (locationCode) {
        localStorage.setItem('bd_portal_id', locationCode);
      }

      /* Show error if opened without any token */
      if (!locationCode) {
        document.getElementById('splash').innerHTML = 
          '<p style="color:#fff;padding:20px;text-align:center;font-family:sans-serif;">' +
          '<strong>Error:</strong> No residence ID found.<br><br>' +
          'Please open this portal using the link provided by Biofilmed Desire.' +
          '</p>';
        return;
      }

      /* Build Apps Script URL from encoded parts to hide it from casual inspection */
      const parts = [
        'aHR0cHM6Ly9zY3JpcHQuZ29vZ2xlLmNvbS9tYWNyb3Mvcy8=',  // https://script.google.com/macros/s/
        'QUtmeWNieTJXM1BnTWFkdG9tZk1McHpzWWtqd1dzdnlNZHN5VFY5cnJqcEdKNTYtR2hzVUtQMFZSd2M2X0FIZ0tnSmtkZw==',  // deployment ID
        'L2V4ZWM='  // /exec
      ];
      
      const scriptBaseUrl = atob(parts[0]) + atob(parts[1]) + atob(parts[2]);
      const finalUrl = scriptBaseUrl + '?code=' + encodeURIComponent(locationCode);
      
      /* Redirect to Apps Script - replace so GitHub URL doesn't stay in history */
      window.location.replace(finalUrl);
    })();
  </script>
</body>
</html>
</body>
</html>
