<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiofilmedDesire Residence Portal</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        iframe { border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <iframe id="portalFrame" src=""></iframe>

    <script>
        // 1. Get the code from the URL (e.g., ?code=A1-00001x)
        const urlParams = new URLSearchParams(window.location.search);
        const userCode = urlParams.get('code');

        // 2. YOUR GOOGLE SCRIPT URL GOES HERE
        const scriptUrl = "PASTE_YOUR_SCRIPT_URL_HERE";

        // 3. Load the script inside the frame with the code attached
        if (userCode) {
            document.getElementById('portalFrame').src = scriptUrl + "?code=" + userCode;
        } else {
            document.body.innerHTML = "<h1>Access Denied. Please use your official link.</h1>";
        }
    </script>
</body>
</html>
