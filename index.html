<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BD Portal">
<title>BiofilmedDesire Residence Portal</title>
<link id="manifest-link" rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-192.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon-192.png">
<link rel="apple-touch-icon" sizes="120x120" href="icon-120.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --bg-dark: #0f172a; --bg-card: #1e293b; --bg-input: #334155;
    --text-main: #f8fafc; --text-muted: #94a3b8;
    --accent: #3b82f6; --accent-hover: #2563eb;
    --danger: #ef4444; --success: #10b981; --warning: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { background: var(--bg-dark); color: var(--text-main); line-height: 1.5; padding: 1rem; }
  .container { max-width: 600px; margin: 0 auto; background: var(--bg-card); border-radius: 12px; padding: 2rem; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
  h1, h2, h3 { text-align: center; margin-bottom: 1.5rem; color: var(--text-main); }
  .input-group { margin-bottom: 1.5rem; position: relative; }
  .input-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }
  .input-wrapper { position: relative; display: flex; align-items: center; }
  .input-wrapper input { width: 100%; padding: 0.75rem 1rem; padding-right: 2.5rem; background: var(--bg-input); border: 1px solid transparent; border-radius: 8px; color: var(--text-main); font-size: 1rem; outline: none; transition: border-color 0.2s; }
  .input-wrapper input:focus { border-color: var(--accent); }
  .toggle-eye { position: absolute; right: 0.75rem; color: var(--text-muted); cursor: pointer; transition: color 0.2s; }
  .toggle-eye:hover { color: var(--text-main); }
  .btn { display: block; width: 100%; padding: 0.75rem; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; text-align: center; }
  .btn:hover { background: var(--accent-hover); }
  .btn:disabled { opacity: 0.7; cursor: not-allowed; }
  .error-msg { color: var(--danger); font-size: 0.875rem; margin-top: 0.5rem; display: none; text-align: center; }
  .success-msg { color: var(--success); font-size: 0.875rem; margin-top: 0.5rem; display: none; text-align: center; }
  
  /* Portal Sections */
  #loginSection, #resetSection, #dashboardSection { display: none; }
  .active-section { display: block !important; }
  
  /* Caretaker Cards */
  .caretaker-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; margin-top: 1rem; }
  .caretaker-card { background: var(--bg-input); padding: 1rem; border-radius: 8px; border: 1px solid #475569; }
  .caretaker-card h4 { margin-bottom: 0.75rem; color: var(--accent); }
</style>
</head>
<body>

<div id="loginSection" class="container active-section">
  <h1>Resident Portal</h1>
  <div class="input-group">
    <label>Enter PIN</label>
    <div class="input-wrapper">
      <input type="password" id="loginPin" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="4-digit PIN">
      <span class="toggle-eye" onclick="toggleVisibility('loginPin', this)">
        <i class="fas fa-eye"></i>
      </span>
    </div>
  </div>
  <button class="btn" id="btnLogin" onclick="handleLogin()">Login</button>
  <div id="loginError" class="error-msg"></div>
</div>

<div id="resetSection" class="container">
  <h1>Reset Master PIN</h1>
  <div class="input-group">
    <label>New Master PIN</label>
    <div class="input-wrapper">
      <input type="password" id="resetPin1" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="Enter new 4-digit PIN">
      <span class="toggle-eye" onclick="toggleVisibility('resetPin1', this)">
        <i class="fas fa-eye"></i>
      </span>
    </div>
  </div>
  <div class="input-group">
    <label>Confirm Master PIN</label>
    <div class="input-wrapper">
      <input type="password" id="resetPin2" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="Confirm new 4-digit PIN">
      <span class="toggle-eye" onclick="toggleVisibility('resetPin2', this)">
        <i class="fas fa-eye"></i>
      </span>
    </div>
  </div>
  <button class="btn" id="btnReset" onclick="handleReset()">Reset PIN</button>
  <div id="resetError" class="error-msg"></div>
</div>

<div id="dashboardSection" class="container">
  <h1 id="dashboardTitle">Dashboard</h1>
  <div id="settingsPanel" style="display: none;">
    <h3>Settings & Caretakers</h3>
    <div class="caretaker-grid" id="caretakerGrid">
      <div class="caretaker-card">
        <h4>Slot 1</h4>
        <div class="input-group">
          <input type="text" id="staff1Name" placeholder="Caretaker Name">
        </div>
        <div class="input-group">
          <div class="input-wrapper">
            <input type="password" id="staff1Pin" placeholder="PIN" maxlength="4">
            <span class="toggle-eye" onclick="toggleVisibility('staff1Pin', this)"><i class="fas fa-eye"></i></span>
          </div>
        </div>
      </div>
      <div class="caretaker-card">
        <h4>Slot 2</h4>
        <div class="input-group">
          <input type="text" id="staff2Name" placeholder="Caretaker Name">
        </div>
        <div class="input-group">
          <div class="input-wrapper">
            <input type="password" id="staff2Pin" placeholder="PIN" maxlength="4">
            <span class="toggle-eye" onclick="toggleVisibility('staff2Pin', this)"><i class="fas fa-eye"></i></span>
          </div>
        </div>
      </div>
      <div class="caretaker-card">
        <h4>Slot 3</h4>
        <div class="input-group">
          <input type="text" id="staff3Name" placeholder="Caretaker Name">
        </div>
        <div class="input-group">
          <div class="input-wrapper">
            <input type="password" id="staff3Pin" placeholder="PIN" maxlength="4">
            <span class="toggle-eye" onclick="toggleVisibility('staff3Pin', this)"><i class="fas fa-eye"></i></span>
          </div>
        </div>
      </div>
      <div class="caretaker-card">
        <h4>Slot 4</h4>
        <div class="input-group">
          <input type="text" id="staff4Name" placeholder="Caretaker Name">
        </div>
        <div class="input-group">
          <div class="input-wrapper">
            <input type="password" id="staff4Pin" placeholder="PIN" maxlength="4">
            <span class="toggle-eye" onclick="toggleVisibility('staff4Pin', this)"><i class="fas fa-eye"></i></span>
          </div>
        </div>
      </div>
    </div>
    <button class="btn" style="margin-top: 1rem;" onclick="saveSettings()">Save Settings</button>
  </div>
  <button class="btn" style="margin-top: 1rem; background: var(--danger);" onclick="logout()">Logout</button>
</div>

<script>
  let userRole = null;

  // --- UI Interactions ---
  function toggleVisibility(inputId, iconSpan) {
    const input = document.getElementById(inputId);
    const icon = iconSpan.querySelector('i');
    if (input.type === 'password') {
      input.type = 'text';
      icon.classList.remove('fa-eye');
      icon.classList.add('fa-eye-slash');
    } else {
      input.type = 'password';
      icon.classList.remove('fa-eye-slash');
      icon.classList.add('fa-eye');
    }
  }

  function showSection(sectionId) {
    document.querySelectorAll('.container').forEach(el => el.classList.remove('active-section'));
    document.getElementById(sectionId).classList.add('active-section');
  }

  function unlockPortal(role) {
    userRole = role;
    showSection('dashboardSection');
    document.getElementById('dashboardTitle').innerText = role === 'MASTER' ? 'Master Dashboard' : 'Staff Dashboard';
    if (role === 'MASTER') {
      document.getElementById('settingsPanel').style.display = 'block';
    } else {
      document.getElementById('settingsPanel').style.display = 'none';
    }
  }

  // --- Hydration & Data Management ---
  // FIXED: Added hydration logic directly tied to the landlord data object
  function hydrateSettingsPanel(data) {
    if (!data) return;
    for (let i = 1; i <= 4; i++) {
      const nameEl = document.getElementById(`staff${i}Name`);
      const pinEl = document.getElementById(`staff${i}Pin`);
      if (nameEl) nameEl.value = data[`staff${i}Name`] || '';
      if (pinEl) pinEl.value = data[`staff${i}Pin`] || '';
    }
  }

  // --- Auth Logic ---
  async function handleLogin() {
    const pin = document.getElementById('loginPin').value;
    const errDiv = document.getElementById('loginError');
    if (!pin || pin.length !== 4) {
      errDiv.innerText = "Please enter a valid 4-digit PIN.";
      errDiv.style.display = 'block';
      return;
    }
    
    // Simulate backend fetch for getLandlordData
    // In production, this calls google.script.run.getLandlordData()
    try {
      // Mock successful login response mapping
      const mockBackendResponse = {
        role: pin === '9999' ? 'MASTER' : 'STAFF',
        staff1Name: 'John Doe', staff1Pin: '1111',
        staff2Name: '', staff2Pin: '',
        staff3Name: '', staff3Pin: '',
        staff4Name: '', staff4Pin: ''
      };

      sessionStorage.setItem('userRole', mockBackendResponse.role);
      sessionStorage.setItem('landlordData', JSON.stringify(mockBackendResponse));
      
      unlockPortal(mockBackendResponse.role);
      
      // Hydrate settings immediately after login if MASTER
      if (mockBackendResponse.role === 'MASTER') {
        hydrateSettingsPanel(mockBackendResponse);
      }
      errDiv.style.display = 'none';
    } catch (err) {
      errDiv.innerText = "Connection error.";
      errDiv.style.display = 'block';
    }
  }

  async function handleReset() {
    const pin1 = document.getElementById('resetPin1').value;
    const pin2 = document.getElementById('resetPin2').value;
    const errDiv = document.getElementById('resetError');
    const btn = document.getElementById('btnReset');
    
    errDiv.style.display = 'none';
    
    if (!pin1 || !pin2) {
      errDiv.innerText = 'Please fill out both fields.';
      errDiv.style.display = 'block';
      return;
    }
    if (pin1 !== pin2) {
      errDiv.innerText = 'PINs do not match.';
      errDiv.style.display = 'block';
      return;
    }
    
    btn.disabled = true;
    try {
      // Simulated successful reset handling (from provided snippet)
      const result = { success: true }; 
      
      if (result.success) {
        sessionStorage.setItem('userRole',     'MASTER');
        sessionStorage.setItem('refreshCount', '0');
        sessionStorage.setItem('activePin',    pin1);
        sessionStorage.setItem('masterPinForValidation', pin1);
        userRole = 'MASTER';
        
        // Clean the reset token from the URL
        if (window.history && window.history.replaceState) {
          const cleanHash = window.location.hash.replace(/&?reset=[^&]*/g, '').replace(/^\?/, '#');
          window.history.replaceState(null, '', window.location.pathname + cleanHash);
        }
        unlockPortal('MASTER');
      } else {
        const errs = {
          INVALID_OR_EXPIRED_TOKEN:     'This reset link is invalid or has already been used. Please request a new one.',
          TOKEN_EXPIRED:                'This reset link has expired (15-minute limit). Please request a new one.',
          TOKEN_MISMATCH:               'Security error. Please request a fresh reset link.',
          PIN_INVALID:                  'PIN must contain digits only.',
          PIN_CONFLICTS_WITH_CARETAKER: 'This PIN is already assigned to one of your caretakers. Please choose a different one.'
        };
        errDiv.innerText = errs[result.error] || 'Could not reset PIN. Please try again.';
        errDiv.style.display = 'block';
      }
    } catch(err) {
      errDiv.innerText = 'Connection error. Please check your signal and try again.';
      errDiv.style.display = 'block';
    }
    btn.disabled = false;
  }

  function logout() {
    sessionStorage.clear();
    location.reload();
  }

  // --- Initialization & Page Reload Handling ---
  window.addEventListener('DOMContentLoaded', () => {
    // Check if URL has reset hash
    if (window.location.hash.includes('reset=')) {
      showSection('resetSection');
      return;
    }

    // FIXED: Hydrate session properly on page reload
    const storedRole = sessionStorage.getItem('userRole');
    if (storedRole) {
      unlockPortal(storedRole);
      
      // If MASTER, pull data from sessionStorage and re-hydrate the caretaker cards
      if (storedRole === 'MASTER') {
        const storedData = sessionStorage.getItem('landlordData');
        if (storedData) {
          hydrateSettingsPanel(JSON.parse(storedData));
        } else {
          // Fallback logic if landlord data is missing but user is Master
          // In production, call getLandlordData() here to refetch staff slots
        }
      }
    } else {
      showSection('loginSection');
    }
  });
</script>
</body>
</html>
