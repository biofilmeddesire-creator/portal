<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="BD Portal">
    
    <title>BiofilmedDesire Residence Portal</title>
    
    <link rel="manifest" href="manifest.json">
    
    <link rel="icon" type="image/jpeg" sizes="192x192" href="logo.jpg">
    <link rel="icon" type="image/jpeg" sizes="512x512" href="logo.jpg">
    <link rel="apple-touch-icon" sizes="192x192" href="logo.jpg">
    <link rel="apple-touch-icon" sizes="180x180" href="logo.jpg">
    <link rel="apple-touch-icon" sizes="152x152" href="logo.jpg">
    <link rel="shortcut icon" href="logo.jpg">

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            overflow: hidden; 
            background-color: #0f172a; 
        }
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        #splash img {
            width: 120px;
            height: 120px;
            border-radius: 24px;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.1);
        }
        #splash p {
            color: #94a3b8;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin-top: 16px;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        iframe { 
            border: none; 
            width: 100%; 
            height: 100%; 
            display: block; 
        }
    </style>
</head>
<body>
    <div id="splash">
        <img src="logo.jpg" alt="Biofilmed Desire">
        <p>Loading portal...</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const locationCode = urlParams.get('id') || '';
        
        const scriptBaseUrl = "https://script.google.com/macros/s/AKfycbyZW3PgMadtomfMLpzsYkjwNVsvyMdSyTV9rrjpGJ56-GhsUKPOVRwc6_AHgKgJRdg/exec";
        const finalUrl = scriptBaseUrl + "?code=" + locationCode;

        const iframe = document.createElement('iframe');
        iframe.src = finalUrl;
        
        iframe.onload = function() {
            const splash = document.getElementById('splash');
            splash.style.opacity = '0';
            setTimeout(() => splash.remove(), 500);
        };
        
        document.body.appendChild(iframe);
    </script>
</body>
</html>
