<!DOCTYPE html>
<html>
<head>
    <title>Residence Portal</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #f8fafc; 
            color: #1e293b; 
            margin: 0; 
        }
        .loader-container { text-align: center; }
        .loader { 
            border: 3px solid #e2e8f0; 
            border-top: 3px solid #0f172a; 
            border-radius: 50%; 
            width: 30px; 
            height: 30px; 
            animation: spin 0.8s linear infinite; 
            margin: 0 auto 15px; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { font-size: 0.9rem; font-weight: 500; letter-spacing: 0.02em; }
    </style>
    <script>
        window.onload = function() {
            /** * Mapped to the perfected Script URL provided 
             * Handling the 'Picture' (singular) and 'Name of Residence' updates
             */
            const targetBase = "https://script.google.com/macros/s/AKfycbyJLzDafToaDVylNcu55eDoytf3WmOs3KgRR_o8sAOj8VFiWSvNXFZbAxNGx7flhRgy/exec";
            
            // Capture the code parameter (e.g., ?code=A1-00001x)
            const queryString = window.location.search;
            
            // Execute stealth redirect
            window.location.href = targetBase + queryString;
        };
    </script>
</head>
<body>
    <div class="loader-container">
        <div class="loader"></div>
        <p>Connecting to secure residence portal...</p>
    </div>
</body>
</html>
